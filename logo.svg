<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Raleway:wght@400;600&amp;display=swap');
      text.title {
        font-family: 'Playfair Display', serif;
        font-size: 52px;
        font-weight: 700;
        fill: #5C3A21;
        text-anchor: middle;
      }
      text.subtitle {
        font-family: 'Raleway', sans-serif;
        font-size: 19px;
        font-weight: 600;
        fill: #FFFFFF;
        text-anchor: middle;
        letter-spacing: 1px;
      }
      text.item {
        font-family: 'Raleway', sans-serif;
        font-size: 22px;
        font-weight: 600;
        fill: #5C3A21;
        text-anchor: middle;
        letter-spacing: 1px;
      }
    </style>

    <!-- Icône Pâtisserie (cupcake) -->
    <g id="icon-patisserie">
      <path d="M-22,8 L-15,-18 L15,-18 L22,8 Z" fill="#D4A373" />
      <path d="M-18,-18 C-18,-32 18,-32 18,-18 C18,-12 10,-8 0,-8 C-10,-8 -18,-12 -18,-18 Z" fill="#F4A261" />
      <circle cx="0" cy="-22" r="6" fill="#E76F51" />
      <path d="M0,-28 Q4,-32 6,-36" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>

    <!-- Icône Restauration (assiette et couverts) -->
    <g id="icon-restauration">
      <circle cx="0" cy="2" r="22" fill="none" stroke="#5C3A21" stroke-width="2.5" />
      <circle cx="0" cy="2" r="16" fill="#FDF6F0" stroke="#5C3A21" stroke-width="1.5" />
      <!-- Fourchette -->
      <line x1="-14" y1="-20" x2="-4" y2="2" stroke="#5C3A21" stroke-width="3" stroke-linecap="round" />
      <line x1="-20" y1="-20" x2="-8" y2="-20" stroke="#5C3A21" stroke-width="1.5" />
      <line x1="-20" y1="-24" x2="-8" y2="-24" stroke="#5C3A21" stroke-width="1.5" />
      <line x1="-20" y1="-28" x2="-8" y2="-28" stroke="#5C3A21" stroke-width="1.5" />
      <!-- Couteau -->
      <line x1="4" y1="2" x2="14" y2="-20" stroke="#5C3A21" stroke-width="3" stroke-linecap="round" />
      <path d="M14,-20 L18,-32 L10,-30 Z" fill="#5C3A21" />
    </g>

    <!-- Icône Réservation (calendrier + check) -->
    <g id="icon-reservation">
      <rect x="-20" y="-25" width="40" height="45" rx="4" fill="none" stroke="#5C3A21" stroke-width="2.5" />
      <rect x="-20" y="-25" width="40" height="14" rx="4" fill="#D4A373" />
      <circle cx="-10" cy="-20" r="2" fill="#5C3A21" />
      <circle cx="10" cy="-20" r="2" fill="#5C3A21" />
      <text x="0" y="-13" font-family="Raleway" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">12</text>
      <path d="M8,10 L13,15 L22,2" fill="none" stroke="#2A9D8F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Ombre portée pour la carte -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="450" fill="#FDF6F0" />

  <!-- Carte avec ombre -->
  <rect x="25" y="25" width="750" height="400" rx="24" fill="#FFFFFF" filter="url(#shadow)" stroke="#E6D5C3" stroke-width="1.5" />

  <!-- Titre -->
  <text x="400" y="110" class="title">Ô’Delice Gourmandise</text>

  <!-- Ligne décorative -->
  <path d="M280,130 Q400,148 520,130" fill="none" stroke="#D4A373" stroke-width="2" stroke-linecap="round" />

  <!-- Bannière sous-titre -->
  <rect x="150" y="165" width="500" height="40" rx="20" fill="#6B4226" />
  <text x="400" y="190" class="subtitle">PÂTISSERIE, RESTAURATION ET RÉSERVATION</text>

  <!-- Colonnes des prestations -->
  <!-- Pâtisserie -->
  <g transform="translate(200, 270) scale(1.4)">
    <use href="#icon-patisserie" />
  </g>
  <text x="200" y="330" class="item">PÂTISSERIE</text>

  <!-- Restauration -->
  <g transform="translate(400, 270) scale(1.4)">
    <use href="#icon-restauration" />
  </g>
  <text x="400" y="330" class="item">RESTAURATION</text>

  <!-- Réservation -->
  <g transform="translate(600, 270) scale(1.4)">
    <use href="#icon-reservation" />
  </g>
  <text x="600" y="330" class="item">RÉSERVATION</text>
</svg>